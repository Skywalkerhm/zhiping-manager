# Docker Compose 开发环境配置
# 智评管家 - 本地开发环境

version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: zhiping-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: zhiping123
      MYSQL_DATABASE: zhiping_manager
      MYSQL_USER: zhiping
      MYSQL_PASSWORD: zhiping123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - zhiping-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: zhiping-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - zhiping-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 应用
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zhiping-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=True
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=zhiping_manager
      - DB_USER=zhiping
      - DB_PASSWORD=zhiping123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhiping-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 前端开发服务器（可选）
  frontend:
    image: node:18-alpine
    container_name: zhiping-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - zhiping-network
    command: sh -c "cd frontend && npm install && npm run dev"
    profiles:
      - frontend

  # pgAdmin（数据库管理，可选）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: zhiping-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zhiping.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - zhiping-network
    profiles:
      - tools

networks:
  zhiping-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  pgadmin_data:
